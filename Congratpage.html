    <style>
        body { font-family: 'Inter', sans-serif; }
        .custom-loader {
            border: 5px solid #f1f5f9;
            border-top: 5px solid #eab308;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-[#eef2f5] flex items-center justify-center min-h-screen p-4 antialiased">

    <div class="w-full max-w-md bg-white rounded-[32px] p-6 shadow-[0_10px_30px_rgba(0,0,0,0.05)] text-center relative transition-all duration-300">
        
        <div id="processBox" class="flex flex-col items-center py-8 space-y-6">
            <h1 class="text-xl font-bold text-slate-800 tracking-tight">
                Please wait.. Checking if you qualify
            </h1>
            <div class="custom-loader"></div>
            <div class="space-y-1">
                <p id="processText" class="text-sm text-slate-600 font-medium">Checking eligibility for the selected offer...</p>
                <p class="text-xs text-slate-400">Please do not refresh this page</p>
            </div>
        </div>

        <div id="congratsBox" class="hidden flex flex-col items-center py-2">
            <div class="w-14 h-14 bg-emerald-100 rounded-full flex items-center justify-center mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-emerald-600 stroke-[3]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                </svg>
            </div>

            <h2 id="titleText" class="text-2xl font-extrabold text-slate-900 mb-1">
                Congrats!
            </h2>
            
            <p id="offerMessage" class="text-sm text-slate-500 font-medium mb-5">
                You qualified for the data below:
            </p>

            <div id="bundleText" class="text-3xl font-black text-[#2563eb] tracking-tight mb-2">
                5GB DATA
            </div>

            <div class="inline-block px-4 py-1.5 text-sm font-bold bg-blue-100 text-blue-700 rounded-full mb-6" id="priceText">
                ₦100 ONLY
            </div>

            <div class="w-full bg-[#f8fafc] border-2 border-[#e2e8f0] rounded-2xl p-4 mb-6 text-left shadow-inner">
                <p class="text-sm md:text-base text-slate-800 font-medium leading-relaxed">
                    To Receive Data - Answer some quiz <span class="font-bold text-black"></span> on the next page to receive Data and also Enter your number when answering.
                </p>
            </div>

            <button id="subBtn" class="w-full bg-[#febb02] hover:bg-[#e2a700] active:scale-[0.99] transition-all text-slate-900 font-black tracking-wider text-base rounded-[40px] p-2.5 flex items-center justify-between pl-8 pr-2.5 shadow-lg shadow-yellow-500/10 cursor-pointer group">
                <span class="uppercase tracking-widest text-xs font-black">Answer Now</span>
                <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center group-hover:translate-x-0.5 transition-transform shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-emerald-500 stroke-[3.5]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                    </svg>
                </div>
            </button>
        </div>

    </div>

    <script>
        // Extract URL parameters
        const params = new URLSearchParams(window.location.search);
        const bundle = params.get("bundle") || "5GB";
        const price = params.get("price") || "100";

        // Separate function to instantly swap page elements for a returning user
        function applyReturningVisitorUI() {
            document.getElementById("processBox").classList.add("hidden");
            document.getElementById("congratsBox").classList.remove("hidden");
            document.getElementById("bundleText").innerText = bundle + " DATA";
            
            document.getElementById("offerMessage").innerHTML = `<span class="text-rose-600 font-bold bg-rose-50 px-2 py-0.5 rounded-md border border-rose-100">⚠️ You may not qualify again.</span><br><span class="inline-block mt-2">Follow the process to receive your data bundle.</span>`;
            document.getElementById("titleText").style.display = "none";
            
            const priceBox = document.getElementById("priceText");
            priceBox.innerText = "Valid for 30 days";
            priceBox.classList.remove("bg-emerald-100", "text-emerald-700");
            priceBox.classList.add("bg-blue-100", "text-blue-700");

            // CRITICAL RESET: Ensures the button is fully enabled and reset to original state when navigating back
            const btn = document.getElementById('subBtn');
            if (btn) {
                btn.disabled = false;
                btn.innerHTML = `
                    <span class="uppercase tracking-widest text-xs font-black">Answer Now</span>
                    <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center group-hover:translate-x-0.5 transition-transform shadow-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-emerald-500 stroke-[3.5]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                        </svg>
                    </div>
                `;
            }
        }

        // Monitors back button activity. If visited flag is active, changes layout instantly without reloading.
        window.addEventListener('pageshow', function(event) {
            if (localStorage.getItem("visited") === "true") {
                applyReturningVisitorUI();
            }
        });

        // Step text loading swap after 4 seconds
        setTimeout(() => {
            if (localStorage.getItem("visited") !== "true") {
                document.getElementById("processText").innerText = "Checking if eligible…";
            }
        }, 4000);

        // Transition from processing screen to standard congrats view at 25 seconds
        setTimeout(() => {
            if (localStorage.getItem("visited") === "true") return;

            document.getElementById("processBox").classList.add("hidden");
            document.getElementById("congratsBox").classList.remove("hidden");
            document.getElementById("bundleText").innerText = bundle + " DATA";
            document.getElementById("priceText").innerText = "Valid for " + price + " days";
        }, 25000);

        // Handle CTA Conversion Click Action
        document.addEventListener("DOMContentLoaded", function() {
            const btn = document.getElementById('subBtn');
            if (!btn) return;
            
            btn.addEventListener('click', function() {
                localStorage.setItem("visited", "true");

                btn.disabled = true;
                btn.innerHTML = `
                    <span class="uppercase tracking-widest text-xs font-black mx-auto">Processing...</span>
                    <div class="w-12 h-12 bg-transparent flex items-center justify-center">
                        <svg class="animate-spin w-5 h-5 text-slate-900" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
                        </svg>
                    </div>
                `;
                
                setTimeout(() => {
                    // Redirects everyone to the single destination URL
                    window.location.href = "https://omg10.com/4/11181284";
                }, 2000);
            });
        });
    </script>
</body>
