<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;
      background: linear-gradient(135deg, #0a58ca, #1e90ff); 
    }

    .page-container {
      min-height:100vh;
      display:flex; 
      align-items:center; 
      justify-content:center; 
      padding:20px;
    }

    .selection-box {
      background: #1a2a4e; 
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      padding: 30px;
      max-width: 450px;
      width: 100%;
      text-align: center;
      color: #fff;
    }

    .selection-box h2 {
      font-size: 26px;
      font-weight: bold;
      color: #fedb70; 
      margin-bottom: 30px;
    }

    .network-grid {
      display: grid;
      grid-template-columns: 1fr 1fr; 
      gap: 20px; 
    }

    .network-button {
      background: #fff;
      border-radius: 15px;
      padding: 20px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #333;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .network-button:hover {
      transform: translateY(-3px);
    }

    .logo-container { 
      width: 50px; 
      height: 50px;
      border-radius: 50%; 
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden; 
    }

    .logo-container img {
        width: 100%;
        height: 100%;
        object-fit: contain; 
        border-radius: 50%; 
    }

    /* loading */
    #loading-bridge {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(12px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      flex-direction: column;
      color: white;
    }

    .spinner {
      width: 55px;
      height: 55px;
      border: 5px solid rgba(255,255,255,0.2);
      border-top: 5px solid #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 15px;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

<!-- Loading Overlay -->
<div id="loading-bridge">
  <div class="spinner"></div>
  <div>Processing...</div>
</div>

<div class="page-container">
  <div class="selection-box">
    <h2>Select Your Network</h2>

    <div class="network-grid">

      <div class="network-button" onclick="redirectUser('MTN')">
        <div class="logo-container">
          <img src="https://i.postimg.cc/KjC3gQP2/download-1.png" />
        </div>
        MTN
      </div>

      <div class="network-button" onclick="redirectUser('AIRTEL')">
        <div class="logo-container">
          <img src="https://i.postimg.cc/76xWpnJd/images-2.png" />
        </div>
        AIRTEL
      </div>

      <div class="network-button" onclick="redirectUser('GLO')">
        <div class="logo-container">
          <img src="https://i.postimg.cc/ZqDwMzZh/images-2-17.jpg" />
        </div>
        GLO
      </div>

      <div class="network-button" onclick="redirectUser('9MOBILE')">
        <div class="logo-container">
          <img src="https://i.postimg.cc/FHTpYXfX/images-2-20.jpg" />
        </div>
        9MOBILE
      </div>

    </div>
  </div>
</div>

<script>
function redirectUser(network) {

    const targetUrl = "https://getfreedatatoday.netlify.app/";

    const userAgent = navigator.userAgent;
    const isTikTok = /TikTok/i.test(userAgent);
    const isAndroid = /Android/i.test(userAgent);
    const isIOS = /iPhone|iPad|iPod/i.test(userAgent);

    document.getElementById('loading-bridge').style.display = 'flex';

    setTimeout(() => {

        if (isTikTok && isAndroid) {
            const intentUrl =
              "intent://" +
              targetUrl.replace(/^https?:\/\//, "") +
              "#Intent;scheme=https;package=com.android.chrome;end";

            window.location.href = intentUrl;
        }

        else if (isTikTok && isIOS) {
            navigator.clipboard.writeText(targetUrl);
            alert("Link copied! Paste in Safari or Chrome.");
        }

        else if (isAndroid) {
            const intentUrl =
              "intent://" +
              targetUrl.replace(/^https?:\/\//, "") +
              "#Intent;scheme=https;package=com.android.chrome;end";

            window.location.href = intentUrl;
        }

        else if (isIOS) {
            window.location.href = targetUrl.replace("https://", "googlechrome://");
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 1500);
        }

        else {
            window.location.href = targetUrl;
        }

    }, 2000);
}
</script>

</body>
</html>
