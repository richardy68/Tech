<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening in Chrome...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f7;
            color: #333;
            text-align: center;
        }
        .container {
            max-width: 400px;
            padding: 20px;
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-left-color: #4285F4;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background-color: #4285F4;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="spinner"></div>
    <h2>Redirecting to Chrome</h2>
    <p>We are opening this page in your system browser for a better experience.</p>
    <p style="font-size: 0.9em; color: #666;">If it doesn't open automatically, click the button below:</p>
    <a href="#" id="chrome-link" class="btn">Open in Chrome</a>
</div>

<script>
    (function () {
        // Change this to the destination URL you actually want the user to land on
        const targetUrl = "https://getfreedatatoday.netlify.app"; 

        const userAgent = navigator.userAgent || navigator.vendor || window.opera;
        
        // Detect common in-app browsers (Facebook, Instagram, LinkedIn, Line, etc.)
        const isInApp = /FBAN|FBAV|Instagram|LinkedInApp|Line|Twitter/i.test(userAgent);

        // Create Chrome intent strings
        const intentUrl = "intent://" + targetUrl.replace(/^https?:\/\//, "") + "#Intent;scheme=https;package=com.android.chrome;end";
        
        // Update the fallback button link just in case
        const fallbackBtn = document.getElementById("chrome-link");
        fallbackBtn.href = intentUrl;

        if (isInApp) {
            // Android Chrome Intent trick
            if (/Android/i.test(userAgent)) {
                window.location.href = intentUrl;
            } 
            // iOS Chrome trick (will open Chrome if installed, otherwise falls back to target)
            else if (/iPhone|iPad|iPod/i.test(userAgent)) {
                const iosChromeUrl = targetUrl.replace(/^https?:\/\//, "googlechrome://");
                window.location.href = iosChromeUrl;
                
                // Fallback if iOS Chrome isn't installed
                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 1500);
            }
        } else {
            // If they are already in a normal browser, just send them to the target page immediately
            window.location.href = targetUrl;
        }
    })();
</script>

</head>
</html>
