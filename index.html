<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Rewards - Limited Offer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader-ring {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-blue-500 font-sans min-h-screen flex items-center justify-center p-4">

    <!-- STEP 1: NETWORK SELECTION -->
    <div id="step1" class="bg-slate-900 rounded-2xl p-8 w-full max-w-sm text-center shadow-2xl">
        <h2 class="text-yellow-400 text-2xl font-bold mb-6">Select Your Network</h2>
        <div class="grid grid-cols-2 gap-4">
            <div onclick="startLoading('MTN')" class="bg-white p-4 rounded-xl cursor-pointer hover:scale-105 transition shadow-lg">
                <img src="https://upload.wikimedia.org/wikipedia/commons/a/af/MTN_Logo.svg" class="h-12 mx-auto mb-2" alt="MTN">
                <p class="font-bold text-gray-800">MTN</p>
            </div>
            <div onclick="startLoading('AIRTEL')" class="bg-white p-4 rounded-xl cursor-pointer hover:scale-105 transition shadow-lg border-2 border-red-500">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e1/Airtel_logo.svg" class="h-12 mx-auto mb-2" alt="Airtel">
                <p class="font-bold text-gray-800">AIRTEL</p>
            </div>
            <div onclick="startLoading('GLO')" class="bg-white p-4 rounded-xl cursor-pointer hover:scale-105 transition shadow-lg border-2 border-green-600">
                <img src="https://upload.wikimedia.org/wikipedia/en/thumb/0/0f/Globacom_Limited_Logo.svg/1200px-Globacom_Limited_Logo.svg.png" class="h-12 mx-auto mb-2" alt="Glo">
                <p class="font-bold text-gray-800">GLO</p>
            </div>
            <div onclick="startLoading('9MOBILE')" class="bg-white p-4 rounded-xl cursor-pointer hover:scale-105 transition shadow-lg border-2 border-lime-500">
                <img src="https://upload.wikimedia.org/wikipedia/en/b/b3/9mobile_logo.png" class="h-12 mx-auto mb-2" alt="9Mobile">
                <p class="font-bold text-gray-800 text-xs">9MOBILE</p>
            </div>
        </div>
    </div>

    <!-- STEP 2: LOADING BRIDGE -->
    <div id="step2" class="hidden bg-white rounded-2xl p-8 w-full max-w-sm text-center shadow-2xl">
        <div class="flex justify-center mb-4">
            <div class="loader-ring"></div>
        </div>
        <p id="loading-text" class="text-gray-700 font-medium">Connecting to Network...</p>
    </div>

    <!-- STEP 3: BUNDLE SELECTION -->
    <div id="step3" class="hidden w-full max-w-sm">
        <div class="bg-blue-600 text-white rounded-t-2xl p-4 flex justify-between items-center">
            <h2 class="font-bold text-xl uppercase italic">Data Rewards</h2>
            <div class="bg-red-500 px-2 py-1 rounded text-xs">ENDS IN 06:58</div>
        </div>
        
        <div class="bg-gray-100 p-4 space-y-4 rounded-b-2xl shadow-xl">
            <p class="text-center text-gray-600 text-sm font-bold uppercase">Choose Your Bundle</p>
            
            <!-- 20GB Offer (THE BAIT) -->
            <div onclick="claimOffer()" class="bg-white border-2 border-blue-600 rounded-xl p-4 relative cursor-pointer hover:bg-blue-50 transition">
                <span class="absolute -top-3 left-1/2 -translate-x-1/2 bg-blue-600 text-white text-[10px] px-3 py-1 rounded-full font-bold uppercase">Most Popular</span>
                <div class="flex justify-between items-start mt-2">
                    <div>
                        <h3 class="text-3xl font-black text-gray-900">20 GB</h3>
                        <span class="bg-blue-100 text-blue-700 text-[10px] px-2 py-0.5 rounded font-bold uppercase">Great Value</span>
                    </div>
                    <div class="text-right">
                        <p class="text-xs text-gray-400 line-through">₦200</p>
                        <p class="text-2xl font-black text-blue-600 font-serif">₦100</p>
                    </div>
                </div>
                <div class="mt-4 text-center">
                    <button class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg uppercase shadow-md">Claim This Bundle</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function startLoading(carrier) {
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            
            const loadingText = document.getElementById('loading-text');
            
            setTimeout(() => { loadingText.innerText = `Connecting to ${carrier} Gateway...`; }, 800);
            setTimeout(() => { loadingText.innerText = `Searching for eligibility...`; }, 1600);
            setTimeout(() => { loadingText.innerText = `20GB Bundle Detected! Success.`; }, 2500);
            
            setTimeout(() => {
                document.getElementById('step2').classList.add('hidden');
                document.getElementById('step3').classList.remove('hidden');
            }, 3200);
        }

        function claimOffer() {
            // REPLACE THE URL BELOW WITH YOUR ACTUAL MVAS OFFER LINK
            window.location.href = "YOUR_OFFER_LINK_HERE";
        }
    </script>
</body>
</html>
