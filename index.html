<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>For All Network</title>

  <meta name="robots" content="noindex,nofollow" />
  <style>
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;
      background: linear-gradient(135deg, #007bff, #00c6ff); 
    }

    .page-container {
      min-height:100vh;
      display:flex; 
      align-items:center; 
      justify-content:center; 
      padding:20px;
    }

    .selection-box {
      background: #1a2a4e; 
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      padding: 30px;
      max-width: 450px;
      width: 100%;
      text-align: center;
      color: #fff;
    }
    .selection-box h2 {
      font-size: 26px;
      font-weight: bold;
      color: #fedb70; 
      margin-bottom: 30px;
    }
    .network-grid {
      display: grid;
      grid-template-columns: 1fr 1fr; 
      gap: 20px; 
    }
    .network-button {
      background: #fff;
      border-radius: 15px;
      padding: 20px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #333;
      font-weight: bold;
      font-size: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }
    .network-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 15px rgba(0,0,0,0.15);
    }
    .network-button .logo-container { 
      width: 50px; 
      height: 50px;
      border-radius: 50%; 
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden; 
      background-color: #eee; 
    }
    .network-button .logo-container img {
        width: 100%;
        height: 100%;
        object-fit: contain; 
        border-radius: 50%; 
    }

    .network-button.mtn { border: 2px solid #ffcc00; }
    .network-button.airtel { border: 2px solid  #ff0000; }
    .network-button.glo { border: 2px solid #17447B; }
    .network-button.ninemobile { border: 2px solid #008000; }

    /* --- LOADING OVERLAY STYLES --- */
    #loading-bridge {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(12px); /* The Blur Effect */
      -webkit-backdrop-filter: blur(12px);
      display: none; 
      justify-content: center;
      align-items: center;
      z-index: 9999;
      flex-direction: column;
      color: white;
    }

    .spinner {
      width: 55px;
      height: 55px;
      border: 5px solid rgba(255, 255, 255, 0.2);
      border-top: 5px solid #ffffff; 
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 16px;
      font-weight: 500;
      opacity: 0.9;
    }
  </style>

  <script>
    function redirectToPage3(networkName) {
        const bridge = document.getElementById('loading-bridge');

        // Show the blurred overlay
        bridge.style.display = 'flex';

        // 1.5 second delay before moving to page1.html
        setTimeout(() => {
            window.location.href = 'page1.html';
        }, 3000);
    }
  </script>
</head>
<body>

  <!-- The Bridge Overlay -->
  <div id="loading-bridge">
    <div class="spinner"></div>
    <div class="loading-text">Processing...</div>
  </div>
  
  <div class="page-container">
    <div class="selection-box">
      <h2>Select Your Network</h2>
      <div class="network-grid">
        <a href="javascript:void(0);" class="network-button mtn" onclick="redirectToPage3('MTN');">
          <div class="logo-container">
            <img src="https://i.postimg.cc/KjC3gQP2/download-1.png" alt="MTN Logo" />
          </div>
          <span>MTN</span>
        </a>
        <a href="javascript:void(0);" class="network-button airtel" onclick="redirectToPage3('AIRTEL');">
          <div class="logo-container">
            <img src="https://i.postimg.cc/FFBJ5qLy/images-(3)-(1).jpg" alt="Airtel Logo" />
          </div>
          <span>TELECEL</span>
        </a>
        <a href="javascript:void(0);" class="network-button glo" onclick="redirectToPage3('GLO');">
          <div class="logo-container">
            <img src="https://i.postimg.cc/W3QJTh4j/images-(3)-(3).jpg" alt="GLO Logo" />
          </div>
          <span>AIRTEL TIGO</span>
        </a>
        <a href="javascript:void(0);" class="network-button ninemobile" onclick="redirectToPage3('9MOBILE');">
          <div class="logo-container">
            <img src="https://i.postimg.cc/ZqDwMzZh/images-2-17.jpg" alt="9Mobile Logo" />
          </div>
          <span>GLO</span>
        </a>
      </div>
    </div>
  </div>
  
</body>
</html>
