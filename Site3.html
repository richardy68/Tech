    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column; /* Changed to column to perfectly push the icon to the bottom */
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f7;
            color: #333;
            text-align: center;
        }
        .container {
            max-width: 400px;
            padding: 20px;
            flex-grow: 1; /* Allows container to take space and keep icon at the bottom */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-left-color: #4285F4;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background-color: #4285F4;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        .chrome-footer-icon {
            margin-bottom: 30px; /* Space from the very bottom of the screen */
        }
    </style>
</head>
<body>

<div class="container">
    <div class="spinner"></div>
    <h2>Opening in Chrome</h2>
    <p>We are opening this page in your Chrome browser for a better experience.</p>
    <p style="font-size: 0.9em; color: #666;">If it doesn't open automatically, click the button below:</p>
    <a href="#" id="chrome-link" class="btn">Open in Chrome</a>
</div>

<div class="chrome-footer-icon">
    <img src="https://i.postimg.cc/J0P8PWH7/Google-Chrome-icon-(2011).png" alt="Chrome Icon" style="width: 100px; height: 100px;">
</div>

<script>
    (function () {
        // Change this to your actual destination URL
        const targetUrl = "https://getfreedatatoday.netlify.app/main.html"; 

        const userAgent = navigator.userAgent || navigator.vendor || window.opera;
        const isFacebook = /FBAN|FBAV/i.test(userAgent);
        const isAndroid = /Android/i.test(userAgent);

        // Clean up URL for Android Intent
        const cleanUrl = targetUrl.replace(/^https?:\/\//, "");
        const intentUrl = "intent://" + cleanUrl + "#Intent;scheme=https;package=com.android.chrome;end";

        // Update the fallback button just in case
        document.getElementById("chrome-link").href = intentUrl;

        // AUTOMATIC REDIRECT REMOVED: 
        // Code that forced the automatic iframe and window.location loads has been stripped.
        // The script now only attaches the deep link to the button.
    })();
</script>
