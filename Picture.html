<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offer Page</title>
<style>
  body {
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #000;
    flex-direction: column;
  }.container { width: 100%; max-width: 500px; }

img { width: 100%; height: auto; display: block; cursor: pointer; }

.spinner { display: none; border: 6px solid #222; border-top: 6px solid #007BFF; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-top: 20px; }

@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } </style>

</head>
<body><div class="container">
  <a href="https://getfreedatatoday.netlify.app/Confirm.html" id="link">
    <img src="https://i.postimg.cc/NfBdyqrj/screenshot-1-(12).jpg" alt="Offer Image">
  </a>
</div><div class="spinner" id="spinner"></div><script>
const link = document.getElementById("link");
const spinner = document.getElementById("spinner");

link.addEventListener("click", function(e) {
  e.preventDefault(); // stop instant redirect
  spinner.style.display = "block";

  setTimeout(function() {
    window.location.href = link.href;
  }, 3000);
});
</script></body>
</html>
