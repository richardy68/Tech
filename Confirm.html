<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirm Subscription</title>
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background-color: #000;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }.container { width: 100%; max-width: 400px; text-align: center; }

img { width: 100%; border-radius: 10px; margin-bottom: 20px; }

.number { font-size: 18px; margin-bottom: 10px; font-weight: bold; }

.text { font-size: 16px; margin-bottom: 20px; }

.btn { background-color: #007BFF; color: #fff; border: none; padding: 15px; width: 100%; font-size: 18px; border-radius: 8px; cursor: pointer; }

.btn:hover { opacity: 0.9; } </style>

</head>
<body><div class="container">
  <img src="https://i.postimg.cc/NfBdyqrj/screenshot-1-(12).jpg" alt="Confirm Image">  <div class="number" id="phoneNumber"></div>
  <div class="text">Confirm subscription now</div><button class="btn" onclick="confirmAction()">Confirm</button>

</div><script>
// Generate random Nigerian phone number
function generateNumber() {
  let prefixes = ["070", "080", "081", "090", "091"];
  let prefix = prefixes[Math.floor(Math.random() * prefixes.length)];
  let number = prefix;
  for (let i = 0; i < 8; i++) {
    number += Math.floor(Math.random() * 10);
  }
  return number;
}

// Set number on page
const phoneElement = document.getElementById("phoneNumber");
phoneElement.innerText = generateNumber();

// Confirm button action
function confirmAction() {
  window.location.href = "https://your-offer-link.com";
}
</script></body>
</html>
