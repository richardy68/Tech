<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open in Chrome</title>

<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f5f5f7;
        color: #333;
        text-align: center;
    }

    .container {
        max-width: 380px;
        padding: 20px;
    }

    .spinner {
        border: 4px solid rgba(0,0,0,0.1);
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border-left-color: #4285F4;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    .btn {
        display: inline-block;
        margin-top: 15px;
        padding: 12px 22px;
        background: #4285F4;
        color: white;
        text-decoration: none;
        border-radius: 6px;
        font-weight: 600;
    }

    .chrome-icon {
        margin-top: 18px;
        width: 60px;
        height: 60px;
        opacity: 0.9;
    }

    .note {
        font-size: 0.85em;
        color: #666;
        margin-top: 10px;
    }
</style>
</head>

<body>

<div class="container">

    <div class="spinner"></div>

    <h2>Open in Chrome</h2>
    <p>For best experience, open this page in your browser.</p>

    <a id="openBtn" class="btn" href="#">Open Now</a>

    <div class="note">
        Tap the button above to continue
    </div>

    <!-- Chrome Icon (Inline SVG, no external image needed) -->
    <svg class="chrome-icon" viewBox="0 0 512 512">
        <circle cx="256" cy="256" r="256" fill="#f4b400"/>
        <path d="M256 256L480 256A224 224 0 0 0 144 96z" fill="#db4437"/>
        <path d="M256 256L144 96A224 224 0 0 0 256 480z" fill="#0f9d58"/>
        <circle cx="256" cy="256" r="96" fill="#4285f4"/>
        <circle cx="256" cy="256" r="48" fill="#eaeaea"/>
    </svg>

</div>

<script>
(function () {

    const targetUrl = "https://getfreedatatoday.netlify.app";

    const userAgent = navigator.userAgent || navigator.vendor || window.opera;
    const isAndroid = /Android/i.test(userAgent);
    const isIOS = /iPhone|iPad|iPod/i.test(userAgent);

    const btn = document.getElementById("openBtn");

    // Default fallback
    btn.href = targetUrl;

    btn.addEventListener("click", function (e) {

        // Android Chrome intent (manual trigger only)
        if (isAndroid) {
            const intentUrl =
                "intent://" +
                targetUrl.replace(/^https?:\/\//, "") +
                "#Intent;scheme=https;package=com.android.chrome;end";

            btn.href = intentUrl;
        }

        // iOS Chrome fallback (manual only)
        else if (isIOS) {
            btn.href = targetUrl.replace(/^https?:\/\//, "googlechrome://");
        }

        // Desktop stays normal
        else {
            btn.href = targetUrl;
        }

    });

})();
</script>

</body>
</html>
