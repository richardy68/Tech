<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Your Network</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 1000px;
            width: 100%;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 2.5rem;
            color: #222;
        }

        p {
            margin-bottom: 40px;
            color: #666;
            font-size: 1.1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 25px;
            padding: 10px;
        }

        .logo-card {
            background: #ffffff;
            border-radius: 15px;
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            height: 180px;
        }

        /* Hover effects to make it feel premium */
        .logo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .logo-card img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* Custom subtle borders for brands if you want to spice it up */
        .mtn:hover { border-bottom: 4px solid #FFCC00; }
        .airtel:hover { border-bottom: 4px solid #E11900; }
        .glo:hover { border-bottom: 4px solid #008751; }
        .mobile9:hover { border-bottom: 4px solid #005A36; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome</h1>
        <p>Please select your network provider to continue</p>
        
        <div class="grid">
            <a href="page1.html" class="logo-card mtn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/9/93/New-mtn-logo.jpg" alt="MTN Logo">
            </a>

            <a href="page1.html" class="logo-card airtel">
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Airtel_logo.svg" alt="Airtel Logo">
            </a>

            <a href="page1.html" class="logo-card glo">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/Glo_button.png" alt="Glo Logo">
            </a>

            <a href="page1.html" class="logo-card mobile9">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/ec/9mobile-logo.jpg" alt="9mobile Logo">
            </a>
        </div>
    </div>

</body>
</html>
